<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div>
        <table>
            <h1>Escola Virtual</h1>
            <h2>Formulário de Pré-Matrícula</h2>
            <fieldset>
                <h3>Dados Pessoais</h3>
                <label for="name">Nome do Aluno:</label>
                <input type="text" name="name" id="name" placeholder="">
                <br>
                <br>
                <label for="date">Nascimento (dd/mm/aaaa):</label>
                <input type="date" name="date" id="date">
                <br>
                <br>
                <label for="name">Nome da Mãe:</label>
                <input type="text" name="name" id="name">
                <br>
                <br>
                <label for="name">Nome do Pai:</label>
                <input type="text" name="name" id="name">
                <br>
                <br>
                <label for="text">Telefone DDD</label>
                <input type="tel" name="fone" id="fone" placeholder="(00) 0000-0000">
                <label for="">Tel:</label>
                <input type="tel" name="" id="">
                <label for="">Ramal:</label>
                <input type="text">
                <br>
                <br>
                <label for="">E-Mail:</label>
                <input type="email" name="" id="">
            </fieldset>
            <fieldset>
                <h3>Informações de Matrícula:</h3>
                <label for="">Série:</label>
                <br>
                <select name="serie" id="serie">
                    <option value="">pré-escola</option>
                </select>
                <br>
                <br>
                <label for="">Turno:</label>
                <br>
                <label for="">Manhã</label>
                <input type="radio" name="Manhã" id="">
                <br>
                <label for="">Tarde</label>
                <input type="radio" name="Tarde" id="">
                <br>
                <br>
                <label for="">Atividades Extracurriculares:</label>
                <br>
                <input type="checkbox" name="" id="">
                <label for="">Informática</label>
                <br>
                <input type="checkbox" name="" id="">
                <label for="">Música</label>
                <br>
                <input type="checkbox" name="" id="">
                <label for="">Balet</label>
                <br>
                <input type="checkbox" name="" id="">
                <label for="">Pintura</label>
                <br>
                <input type="checkbox" name="" id="">
                <label for="">Judô</label>
                <br>
                <input type="checkbox" name="" id="">
                <label for="">Futebol</label>
                <br>
            </fieldset>
            <button>Enviar Formulário</button>
            <button>Limpar Campos</button>
        </table>    
    </div>
</body>
</html>
